<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background-color: #fce4ec; margin: 0; padding: 20px; }
        
        /* Contenedor principal */
        .main-card { background: white; border-radius: 25px; padding: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Encabezado morado */
        .header-section { background: linear-gradient(to right, #f3e5f5, #e1bee7); border-radius: 20px; padding: 30px; margin-bottom: 20px; }
        
        /* Stats Bar */
        .stats-bar { display: flex; justify-content: space-around; border-top: 1px solid #ddd; padding-top: 20px; margin-top: 20px; }
        .stat { text-align: center; }
        .stat b { font-size: 24px; color: #4a148c; display: block; }
        .stat span { font-size: 12px; color: #78909c; text-transform: uppercase; }

        /* Resumen */
        .resumen-bar { display: flex; align-items: center; justify-content: space-between; padding: 20px; background: #fff; border-radius: 20px; margin-bottom: 20px; }
        .resumen-btns { display: flex; gap: 10px; }
        .btn-count { padding: 15px 25px; border-radius: 15px; border: none; font-weight: bold; }

        /* Formulario */
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 10px; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header-section">
        <h1>Checklist de Auditoría ISO/IEC 17025:2017</h1>
        <p>Evaluación de cumplimiento de la norma... para laboratorios de ensayo y calibración.</p>
        
        <div class="stats-bar">
            <div class="stat"><b>65</b><span>Criterios totales</span></div>
            <div class="stat"><b>65</b><span>Aplican</span></div>
            <div class="stat"><b>0</b><span>Cumplen</span></div>
            <div class="stat"><b>0</b><span>No cumplen</span></div>
            <div class="stat"><b>0</b><span>No aplican</span></div>
            <div class="stat"><b>0</b><span>Respondidos</span></div>
        </div>
    </div>

    <div class="resumen-bar">
        <div><h3>Resumen de evaluación</h3></div>
        <div class="resumen-btns">
            <button class="btn-count" style="background:#e8f5e9; color:#2e7d32;">0 CUMPLE</button>
            <button class="btn-count" style="background:#ffebee; color:#c62828;">0 NO CUMPLE</button>
            <button class="btn-count" style="background:#f5f5f5; color:#616161;">0 - N/A</button>
            <button class="btn-count" style="background:#e3f2fd; color:#1976d2;">65 TOTAL</button>
        </div>
    </div>

    <div class="identificacion">
        <h2>🏛️ Identificación del Laboratorio</h2>
        <div class="form-grid">
            <div class="input-group"><label>Nombre</label><input type="text"></div>
            <div class="input-group"><label>Código</label><input type="text"></div>
            <div class="input-group"><label>Ciudad</label><input type="text"></div>
        </div>
    </div>
</div>

</body>
</html>
